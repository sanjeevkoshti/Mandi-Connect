<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / Register | Mandi-Connect</title>
  <meta name="description" content="Login or register to Mandi-Connect — the direct farm-to-retail marketplace.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f3d2e">
  <style>
    .otp-popup-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 2000; display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
    }
    .otp-popup-overlay.show { opacity: 1; pointer-events: all; }
    .otp-popup {
      background: white; border-radius: 16px; padding: 32px 28px; text-align: center;
      max-width: 360px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      transform: scale(0.85); transition: transform 0.3s ease;
    }
    .otp-popup-overlay.show .otp-popup { transform: scale(1); }
    .otp-popup-icon { font-size: 3rem; margin-bottom: 12px; }
    .otp-popup h3 { margin: 0 0 8px; font-size: 1.2rem; }
    .otp-popup p { color: var(--text-muted); font-size: 0.92rem; margin: 0 0 20px; }

    .email-otp-row { display: flex; gap: 10px; align-items: flex-end; }
    .email-otp-row .form-group { flex: 1; margin-bottom: 0; }
    .email-otp-row .btn { white-space: nowrap; height: 44px; }

    .otp-verify-area {
      display: none; margin-top: 16px; padding: 20px;
      background: #f0faf4; border: 2px dashed var(--primary); border-radius: 12px;
    }
    .otp-verify-area.show { display: block; animation: slideDown 0.3s ease; }
    .otp-verify-area input {
      font-size: 1.4rem; letter-spacing: 10px; text-align: center; font-weight: 700;
    }
    .verify-btn {
      margin-top: 12px; background: var(--primary); color: white;
      font-size: 1rem; font-weight: 700; padding: 12px; width: 100%;
      border: none; border-radius: 10px; cursor: pointer;
    }
    .verify-btn:hover { background: var(--primary-dark); }
    .verify-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .otp-timer { font-size: 0.82rem; color: var(--text-muted); margin-top: 8px; }
    .otp-timer a { cursor: pointer; color: var(--primary); font-weight: 600; }

    .verified-badge {
      display: none; margin-top: 12px; padding: 10px; background: #d4edda;
      color: #155724; border-radius: 10px; text-align: center;
      font-weight: 600; font-size: 0.95rem;
    }
    .verified-badge.show { display: block; animation: slideDown 0.3s ease; }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="offline-banner" class="offline-banner">⚠️ You are offline</div>

  <!-- Popup -->
  <div id="otp-popup-overlay" class="otp-popup-overlay">
    <div class="otp-popup">
      <div id="popup-icon" class="otp-popup-icon">✅</div>
      <h3 id="popup-title">Success</h3>
      <p id="popup-message">Message here</p>
      <button class="btn btn-primary" onclick="closePopup()">OK</button>
    </div>
  </div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">🌾</div>
      <h2>Mandi<span style="color:var(--primary);">Connect</span></h2>
      <p class="text-center text-muted mt-1 mb-2">Direct farm-to-retail marketplace</p>

      <!-- Tabs -->
      <div class="auth-tab-btns">
        <button id="tab-login" class="active" onclick="switchTab('login')">Login</button>
        <button id="tab-register" onclick="switchTab('register')">Register</button>
      </div>

      <div id="auth-alert" class="hidden"></div>

      <!-- ====== LOGIN FORM ====== -->
      <form id="login-form" onsubmit="return false;">
        <div class="form-group">
          <label class="form-label">📧 Email Address</label>
          <div class="email-otp-row">
            <div class="form-group">
              <input type="email" id="login-email" class="form-control" placeholder="you@example.com" required>
            </div>
            <button type="button" class="btn btn-accent" id="login-send-btn" onclick="sendLoginOTP()">Send OTP</button>
          </div>
        </div>

        <!-- OTP Area -->
        <div id="login-otp-area" class="otp-verify-area">
          <label class="form-label" style="color:var(--primary-dark);">🔐 Enter 6-digit OTP sent to your email</label>
          <input type="text" id="login-otp" class="form-control" placeholder="● ● ● ● ● ●" maxlength="6">
          <p class="otp-timer" id="login-timer"></p>
          <button type="button" class="verify-btn" id="login-verify-btn" onclick="verifyLoginOTP()">✅ Verify OTP</button>
        </div>

        <div id="login-verified-badge" class="verified-badge">✅ Email Verified Successfully!</div>
        <button type="button" class="btn btn-primary btn-block mt-2" id="login-final-btn" style="display:none;" onclick="completeLogin()">🔑 Login to Account</button>

        <p class="text-center mt-2" style="font-size:0.88rem;">Don't have an account? <a href="#" onclick="switchTab('register')">Register here</a></p>
      </form>

      <!-- ====== REGISTER FORM ====== -->
      <form id="register-form" class="hidden" onsubmit="return false;">
        <p class="form-label mb-1">I am a:</p>
        <div class="role-selector">
          <button type="button" class="role-btn selected" id="role-farmer" onclick="selectRole('farmer')">🌱 Farmer</button>
          <button type="button" class="role-btn" id="role-retailer" onclick="selectRole('retailer')">🛒 Retailer</button>
        </div>

        <div class="form-group">
          <label class="form-label">👤 Full Name</label>
          <input type="text" id="reg-name" class="form-control" placeholder="Your full name" required>
        </div>

        <div class="form-group">
          <label class="form-label">📧 Email Address</label>
          <div class="email-otp-row">
            <div class="form-group">
              <input type="email" id="reg-email" class="form-control" placeholder="you@example.com" required>
            </div>
            <button type="button" class="btn btn-accent" id="reg-send-btn" onclick="sendRegisterOTP()">Send OTP</button>
          </div>
        </div>

        <!-- OTP Area -->
        <div id="reg-otp-area" class="otp-verify-area">
          <label class="form-label" style="color:var(--primary-dark);">🔐 Enter 6-digit OTP sent to your email</label>
          <input type="text" id="reg-otp" class="form-control" placeholder="● ● ● ● ● ●" maxlength="6">
          <p class="otp-timer" id="reg-timer"></p>
          <button type="button" class="verify-btn" id="reg-verify-btn" onclick="verifyRegisterOTP()">✅ Verify OTP</button>
        </div>

        <div id="reg-verified-badge" class="verified-badge">✅ Email Verified Successfully!</div>

        <div class="form-group">
          <label class="form-label">📱 Phone Number</label>
          <input type="tel" id="reg-phone" class="form-control" placeholder="+91 98765 43210">
        </div>

        <div class="form-group">
          <label class="form-label">📍 Village / City</label>
          <input type="text" id="reg-location" class="form-control" placeholder="e.g. Nashik, Maharashtra" required>
        </div>

        <button type="button" class="btn btn-primary btn-block" id="reg-final-btn" style="display:none;" onclick="completeRegistration()">🎉 Create Account</button>

        <p class="text-center mt-2" style="font-size:0.88rem;">Already have an account? <a href="#" onclick="switchTab('login')">Login</a></p>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    let selectedRole = 'farmer';
    let loginEmailVerified = false;
    let regEmailVerified = false;

    window.selectRole = function(role) {
      selectedRole = role;
      document.getElementById('role-farmer').classList.toggle('selected', role === 'farmer');
      document.getElementById('role-retailer').classList.toggle('selected', role === 'retailer');
    }

    window.switchTab = function(tab) {
      const isLogin = tab === 'login';
      document.getElementById('login-form').classList.toggle('hidden', !isLogin);
      document.getElementById('register-form').classList.toggle('hidden', isLogin);
      document.getElementById('tab-login').classList.toggle('active', isLogin);
      document.getElementById('tab-register').classList.toggle('active', !isLogin);
      document.getElementById('auth-alert').classList.add('hidden');
    }

    function showAuthAlert(msg, type = 'error') {
      const el = document.getElementById('auth-alert');
      el.className = `alert alert-${type}`;
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    function showPopup(icon, title, message) {
      document.getElementById('popup-icon').textContent = icon;
      document.getElementById('popup-title').textContent = title;
      document.getElementById('popup-message').textContent = message;
      document.getElementById('otp-popup-overlay').classList.add('show');
    }
    function closePopup() {
      document.getElementById('otp-popup-overlay').classList.remove('show');
    }

    function startTimer(elementId, resendFn) {
      const el = document.getElementById(elementId);
      let remaining = 30;
      el.innerHTML = `Resend OTP in <strong>${remaining}s</strong>`;
      const interval = setInterval(() => {
        remaining--;
        if (remaining <= 0) {
          clearInterval(interval);
          el.innerHTML = `Didn't receive? <a id="${elementId}-resend">Resend OTP</a>`;
          document.getElementById(`${elementId}-resend`).addEventListener('click', resendFn);
        } else {
          el.innerHTML = `Resend OTP in <strong>${remaining}s</strong>`;
        }
      }, 1000);
    }

    // Init
    registerServiceWorker();
    setupConnectivityMonitor();

    const profile = getLocalProfile();
    if (profile) {
      window.location.href = profile.role === 'farmer' ? '/farmer-dashboard.html' : '/marketplace.html';
    }

    const params = new URLSearchParams(window.location.search);
    if (params.get('role') === 'retailer') { switchTab('register'); selectRole('retailer'); }
    else if (params.get('role') === 'farmer') { switchTab('register'); }

    // ======= LOGIN: Send OTP → Verify OTP → Login =======

    async function sendLoginOTP() {
      const email = document.getElementById('login-email').value.trim();
      if (!email) return showAuthAlert('Please enter your email address.');

      const btn = document.getElementById('login-send-btn');
      btn.disabled = true; btn.textContent = 'Sending...';

      try {
        await apiSendOTP(email);
        document.getElementById('login-otp-area').classList.add('show');
        btn.textContent = 'Sent ✓'; btn.style.background = '#28a745';
        startTimer('login-timer', sendLoginOTP);
        showPopup('📩', 'OTP Sent!', `A 6-digit OTP has been sent to ${email}. Please check your email inbox.`);
      } catch (e) {
        showPopup('❌', 'Failed to Send OTP', e.message || 'Could not send OTP.');
        btn.disabled = false; btn.textContent = 'Send OTP';
      }
    }

    async function verifyLoginOTP() {
      const email = document.getElementById('login-email').value.trim();
      const otp = document.getElementById('login-otp').value.trim();
      if (otp.length !== 6) return showAuthAlert('Enter the full 6-digit OTP.');

      const btn = document.getElementById('login-verify-btn');
      btn.disabled = true; btn.textContent = 'Verifying...';

      try {
        await apiVerifyOTP(email, otp);
        loginEmailVerified = true;
        document.getElementById('login-otp-area').style.display = 'none';
        document.getElementById('login-verified-badge').classList.add('show');
        document.getElementById('login-final-btn').style.display = 'block';
        showPopup('✅', 'Email Verified!', 'Your email has been verified successfully. Click Login to continue.');
      } catch (e) {
        showPopup('❌', 'Invalid OTP', e.message || 'Invalid OTP. Please try again.');
        btn.disabled = false; btn.textContent = '✅ Verify OTP';
      }
    }

    async function completeLogin() {
      if (!loginEmailVerified) return showAuthAlert('Please verify your email first.');
      const email = document.getElementById('login-email').value.trim();
      const btn = document.getElementById('login-final-btn');
      btn.disabled = true; btn.textContent = 'Logging in...';

      const users = getLocalUsers();
      const user = users.find(u => u.email === email);
      if (!user) {
        showPopup('❌', 'Not Found', 'No account found with this email. Please register first.');
        btn.disabled = false; btn.textContent = '🔑 Login to Account';
        return;
      }

      saveLocalSession(user);
      showPopup('🎉', 'Welcome Back!', `Hello ${user.full_name}! Redirecting...`);
      setTimeout(() => {
        window.location.href = user.role === 'farmer' ? '/farmer-dashboard.html' : '/marketplace.html';
      }, 1200);
    }

    // ======= REGISTER: Send OTP → Verify OTP → Create Account =======

    async function sendRegisterOTP() {
      const name = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      if (!name) return showAuthAlert('Please enter your full name first.');
      if (!email) return showAuthAlert('Please enter your email address.');

      const btn = document.getElementById('reg-send-btn');
      btn.disabled = true; btn.textContent = 'Sending...';

      try {
        await apiSendOTP(email);
        document.getElementById('reg-otp-area').classList.add('show');
        btn.textContent = 'Sent ✓'; btn.style.background = '#28a745';
        startTimer('reg-timer', sendRegisterOTP);
        showPopup('📩', 'OTP Sent!', `A 6-digit OTP has been sent to ${email}. Check your email inbox (and spam folder).`);
      } catch (e) {
        showPopup('❌', 'Failed to Send OTP', e.message || 'Could not send OTP.');
        btn.disabled = false; btn.textContent = 'Send OTP';
      }
    }

    async function verifyRegisterOTP() {
      const email = document.getElementById('reg-email').value.trim();
      const otp = document.getElementById('reg-otp').value.trim();
      if (otp.length !== 6) return showAuthAlert('Enter the full 6-digit OTP.');

      const btn = document.getElementById('reg-verify-btn');
      btn.disabled = true; btn.textContent = 'Verifying...';

      try {
        await apiVerifyOTP(email, otp);
        regEmailVerified = true;
        document.getElementById('reg-otp-area').style.display = 'none';
        document.getElementById('reg-verified-badge').classList.add('show');
        document.getElementById('reg-final-btn').style.display = 'block';
        showPopup('✅', 'Email Verified!', 'Your email has been verified successfully. Fill remaining details and click Create Account.');
      } catch (e) {
        showPopup('❌', 'Invalid OTP', e.message || 'Invalid OTP. Please try again.');
        btn.disabled = false; btn.textContent = '✅ Verify OTP';
      }
    }

    async function completeRegistration() {
      if (!regEmailVerified) return showAuthAlert('Please verify your email first.');

      const name = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const phone = document.getElementById('reg-phone').value.trim();
      const location = document.getElementById('reg-location').value.trim();

      if (!location) return showAuthAlert('Please enter your village / city.');

      const btn = document.getElementById('reg-final-btn');
      btn.disabled = true; btn.textContent = 'Creating account...';

      // Check duplicate
      const users = getLocalUsers();
      if (users.find(u => u.email === email)) {
        showPopup('⚠️', 'Already Registered', 'This email is already registered. Please login.');
        btn.disabled = false; btn.textContent = '🎉 Create Account';
        return;
      }

      function generateId() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
          const r = Math.random() * 16 | 0;
          const v = c === 'x' ? r : (r & 0x3 | 0x8);
          return v.toString(16);
        });
      }

      const newProfile = {
        id: generateId(),
        email: email,
        full_name: name,
        phone: phone,
        location: location,
        role: selectedRole,
        created_at: new Date().toISOString()
      };

      saveLocalUser(newProfile);
      saveLocalSession(newProfile);

      showPopup('🎉', 'Registration Successful!', `Welcome ${name}! Redirecting to your dashboard...`);
      setTimeout(() => {
        window.location.href = newProfile.role === 'farmer' ? '/farmer-dashboard.html' : '/marketplace.html';
      }, 1500);
    }
  </script>
</body>
</html>
