<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / Register | Mandi-Connect</title>
  <meta name="description" content="Login or register to Mandi-Connect — the direct farm-to-retail marketplace.">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Popup Styles */
    .otp-popup-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 2000; display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
    }
    .otp-popup-overlay.show { opacity: 1; pointer-events: all; }
    .otp-popup {
      background: white; border-radius: 16px; padding: 32px 28px; text-align: center;
      max-width: 360px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      transform: scale(0.85); transition: transform 0.3s ease;
    }
    .otp-popup-overlay.show .otp-popup { transform: scale(1); }
    .otp-popup-icon { font-size: 3rem; margin-bottom: 12px; }
    .otp-popup h3 { margin: 0 0 8px; font-size: 1.2rem; }
    .otp-popup p { color: var(--text-muted); font-size: 0.92rem; margin: 0 0 20px; }

    /* Fix Layout Overrides */
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary-dark) 0%, #1e5c3c 100%);
      padding: 24px;
    }
    .auth-card {
      background: white;
      border-radius: var(--radius);
      padding: 36px;
      width: 100%;
      max-width: 440px;
      box-shadow: var(--shadow-lg);
    }
    
    /* Ensure role buttons look centered */
    .role-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
  </style>
</head>
<body>
  <div id="offline-banner" class="offline-banner">⚠️ You are offline</div>

  <!-- Success/Error Popup -->
  <div id="otp-popup-overlay" class="otp-popup-overlay">
    <div class="otp-popup">
      <div id="popup-icon" class="otp-popup-icon">✅</div>
      <h3 id="popup-title">Success</h3>
      <p id="popup-message">Message here</p>
      <button class="btn btn-primary" onclick="closePopup()">OK</button>
    </div>
  </div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">🌾</div>
      <h2>Mandi<span style="color:var(--primary);">Connect</span></h2>
      <p class="text-center text-muted mt-1 mb-2">Direct farm-to-retail marketplace</p>

      <!-- Tabs -->
      <div class="auth-tab-btns">
        <button id="tab-login" class="active" onclick="switchTab('login')">Login</button>
        <button id="tab-register" onclick="switchTab('register')">Register</button>
      </div>

      <div id="auth-alert" class="hidden"></div>

      <!-- ====== LOGIN FORM ====== -->
      <form id="login-form" onsubmit="completeLogin(event)">
        <div class="form-group">
          <label class="form-label">📧 Email Address</label>
          <input type="email" id="login-email" class="form-control" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label class="form-label">🔑 Password</label>
          <input type="password" id="login-password" class="form-control" placeholder="Enter your password" required>
        </div>

        <div class="flex-between mb-2">
          <span></span>
          <a href="#" onclick="showForgotPassword(event)" style="font-size:0.85rem; color:var(--primary);">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="login-final-btn">🔑 Login to Account</button>

        <p class="text-center mt-2" style="font-size:0.88rem;">Don't have an account? <a href="#" onclick="switchTab('register')">Register here</a></p>
      </form>

      <!-- ====== REGISTER FORM ====== -->
      <form id="register-form" class="hidden" onsubmit="completeRegistration(event)">
        <p class="form-label mb-1">I am a:</p>
        <div class="role-selector">
          <button type="button" class="role-btn selected" id="role-farmer" onclick="setRole('farmer')">🌱 Farmer</button>
          <button type="button" class="role-btn" id="role-retailer" onclick="setRole('retailer')">🛒 Retailer</button>
        </div>

        <div class="form-group">
          <label class="form-label">👤 Full Name</label>
          <input type="text" id="reg-name" class="form-control" placeholder="Your full name" required>
        </div>

        <div class="form-group">
          <label class="form-label">📧 Email Address</label>
          <input type="email" id="reg-email" class="form-control" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label class="form-label">📱 Phone Number</label>
          <input type="tel" id="reg-phone" class="form-control" placeholder="+91 98765 43210">
        </div>

        <div class="form-group">
          <label class="form-label">📍 Village / City</label>
          <input type="text" id="reg-location" class="form-control" placeholder="e.g. Nashik, Maharashtra" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">🔑 Create Password</label>
          <input type="password" id="reg-password" class="form-control" placeholder="Minimum 6 characters" required minlength="6">
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="reg-final-btn">🎉 Create Account</button>

        <p class="text-center mt-2" style="font-size:0.88rem;">Already have an account? <a href="#" onclick="switchTab('login')">Login</a></p>
      </form>

      <!-- ====== FORGOT PASSWORD FORM ====== -->
      <form id="forgot-password-form" class="hidden" onsubmit="handleForgotPassword(event)">
        <h3 class="mb-1" style="font-size:1.1rem;">Reset Password</h3>
        <p class="text-muted mb-2" style="font-size:0.88rem;">Enter your email to receive a password reset link.</p>
        
        <div class="form-group">
          <label class="form-label">📧 Email Address</label>
          <input type="email" id="forgot-email" class="form-control" placeholder="you@example.com" required>
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="forgot-btn">📧 Send Reset Link</button>
        
        <p class="text-center mt-2" style="font-size:0.88rem;"><a href="#" onclick="switchTab('login')">Back to Login</a></p>
      </form>
    </div>
  </div>

  <script src="js/api.js?v=2"></script>
  <script src="js/auth.js?v=2"></script>
  <script>
    let selectedRole = 'farmer';

    window.setRole = (role) => {
      selectedRole = role;
      document.getElementById('role-farmer').classList.toggle('selected', role === 'farmer');
      document.getElementById('role-retailer').classList.toggle('selected', role === 'retailer');
    }

    window.switchTab = function(tab) {
      const isLogin = tab === 'login';
      document.getElementById('login-form').classList.toggle('hidden', !isLogin);
      document.getElementById('register-form').classList.toggle('hidden', isLogin);
      document.getElementById('forgot-password-form').classList.add('hidden');
      document.getElementById('tab-login').classList.toggle('active', isLogin);
      document.getElementById('tab-register').classList.toggle('active', !isLogin);
      document.getElementById('auth-alert').classList.add('hidden');
    }

    window.showForgotPassword = (e) => {
      e.preventDefault();
      document.getElementById('login-form').classList.add('hidden');
      document.getElementById('forgot-password-form').classList.remove('hidden');
    }

    function showAuthAlert(msg, type = 'error') {
      const el = document.getElementById('auth-alert');
      el.className = `alert alert-${type}`;
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    function showPopup(icon, title, message) {
      document.getElementById('popup-icon').textContent = icon;
      document.getElementById('popup-title').textContent = title;
      document.getElementById('popup-message').textContent = message;
      document.getElementById('otp-popup-overlay').classList.add('show');
    }
    function closePopup() {
      document.getElementById('otp-popup-overlay').classList.remove('show');
    }

    function startTimer(elementId, resendFn) {
      const el = document.getElementById(elementId);
      let remaining = 60;
      el.innerHTML = `Resend OTP in <strong>${remaining}s</strong>`;
      const interval = setInterval(() => {
        remaining--;
        if (remaining <= 0) {
          clearInterval(interval);
          el.innerHTML = `Didn't receive? <a id="${elementId}-resend">Resend OTP</a>`;
          document.getElementById(`${elementId}-resend`).addEventListener('click', resendFn);
        } else {
          el.innerHTML = `Resend OTP in <strong>${remaining}s</strong>`;
        }
      }, 1000);
    }

    // Init
    registerServiceWorker();
    setupConnectivityMonitor();

    const profile = getLocalProfile();
    if (profile) {
      window.location.href = profile.role === 'farmer' ? '/farmer-dashboard.html' : '/marketplace.html';
    }

    const params = new URLSearchParams(window.location.search);
    if (params.get('role') === 'retailer') { switchTab('register'); setRole('retailer'); }

    // LOGIN
    async function completeLogin(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const btn = document.getElementById('login-final-btn');
      
      btn.disabled = true; btn.textContent = 'Logging in...';
      try {
        const result = await apiLogin(email, password);
        if (result.success) {
          saveLocalSession(result.user);
          showPopup('🚀', 'Success!', 'Redirecting to your dashboard...');
          setTimeout(() => {
            window.location.href = result.user.role === 'farmer' ? '/farmer-dashboard.html' : '/marketplace.html';
          }, 1000);
        }
      } catch (e) {
        showAuthAlert(e.message || 'Login failed.');
        btn.disabled = false; btn.textContent = '🔑 Login to Account';
      }
    }

    // REGISTER
    async function completeRegistration(e) {
      e.preventDefault();
      const btn = document.getElementById('reg-final-btn');
      btn.disabled = true; btn.textContent = 'Registering...';
      showAuthAlert('Attempting connection to backend...', 'info');

      const userData = {
        email: document.getElementById('reg-email').value.trim(),
        full_name: document.getElementById('reg-name').value.trim(),
        phone: document.getElementById('reg-phone').value.trim(),
        location: document.getElementById('reg-location').value.trim(),
        role: selectedRole,
        password: document.getElementById('reg-password').value
      };

      try {
        const result = await apiRegister(userData);
        if (result.success) {
          saveLocalSession(result.user);
          showPopup('✅', 'Success!', 'Account created successfully! Redirecting...');
          setTimeout(() => {
            window.location.href = result.user.role === 'farmer' ? '/farmer-dashboard.html' : '/marketplace.html';
          }, 1500);
        }
      } catch (e) {
        showAuthAlert(e.message || 'Registration failed.');
        btn.disabled = false; btn.textContent = '🎉 Create Account';
      }
    }

    // FORGOT PASS
    async function handleForgotPassword(e) {
      e.preventDefault();
      const email = document.getElementById('forgot-email').value.trim();
      try {
        await apiForgotPassword(email);
        showPopup('📧', 'Link Sent', 'Check your email for password reset instructions.');
        switchTab('login');
      } catch (e) {
        showAuthAlert(e.message || 'Error occurred.');
      }
    }
  </script>
</body>
</html>
