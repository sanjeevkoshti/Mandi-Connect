<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password | MandiConnect</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #28a745;
            --primary-dark: #1e7e34;
            --accent: #ffc107;
            --bg-glass: rgba(255, 255, 255, 0.9);
            --shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f5fdf7 0%, #e8f5e9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .reset-card {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-circle {
            width: 70px;
            height: 70px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 24px;
            box-shadow: 0 10px 20px rgba(40, 167, 69, 0.3);
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 8px;
        }

        p.subtitle {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #34495e;
            margin-bottom: 6px;
            margin-left: 4px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 2px solid #edf2f7;
            background: #fff;
            font-size: 15px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .input-group input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(40, 167, 69, 0.1);
        }

        .btn-update {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.2);
        }

        .btn-update:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(40, 167, 69, 0.3);
        }

        .btn-update:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .alert {
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }

        .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .alert-success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }

        .footer-link {
            margin-top: 25px;
            font-size: 14px;
        }

        .footer-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-link a:hover { text-decoration: underline; }

        /* Error state for missing link */
        .error-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            border-radius: 24px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="reset-card">
        <div class="logo-circle">🌿</div>
        <h1>New Password</h1>
        <p class="subtitle">Secure your MandiConnect account</p>

        <div id="status-alert" class="alert"></div>

        <form id="reset-form" onsubmit="handleResetAction(event)">
            <div class="input-group">
                <label>NEW PASSWORD</label>
                <input type="password" id="pass1" placeholder="At least 6 characters" required minlength="6">
            </div>

            <div class="input-group">
                <label>CONFIRM NEW PASSWORD</label>
                <input type="password" id="pass2" placeholder="Repeat your password" required minlength="6">
            </div>

            <button type="submit" id="submit-btn" class="btn-update">Update Password</button>
        </form>

        <div class="footer-link">
            Already remember? <a href="login.html">Sign In</a>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let resetToken = urlParams.get('token');
        let userEmail = urlParams.get('email');

        // Development/Testing Mode helper
        if (!resetToken || !userEmail) {
            // showAlert('💡 Testing Mode Active', 'success');
            resetToken = 'demo_token';
            userEmail = 'demo@example.com';
            document.getElementById('submit-btn').textContent = 'Update Password';
        }

        async function handleResetAction(e) {
            e.preventDefault();
            const p1 = document.getElementById('pass1').value;
            const p2 = document.getElementById('pass2').value;
            const alert = document.getElementById('status-alert');
            const btn = document.getElementById('submit-btn');

            if (p1 !== p2) {
                showAlert('Passwords do not match!', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Securing account...';
            alert.style.display = 'none';

            // MOCK MODE: Just pretend it worked if we are in demo
            if (resetToken === 'demo_token') {
                setTimeout(() => {
                    showAlert('Success! Password updated (Demo Mode). Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = 'login.html?reset=success';
                    }, 1500);
                }, 1000);
                return;
            }

            try {
                const res = await apiResetPassword(resetToken, userEmail, p1);
                showAlert('Password updated! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (err) {
                showAlert(err.message || 'Error resetting password', 'error');
                btn.disabled = false;
                btn.textContent = 'Update Password';
            }
        }

        function showAlert(msg, type) {
            const alert = document.getElementById('status-alert');
            alert.textContent = msg;
            alert.className = `alert alert-${type}`;
            alert.style.display = 'block';
        }
    </script>
</body>
</html>
