<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketplace | Mandi-Connect</title>
  <meta name="description" content="Browse fresh crop listings directly from farmers. Filter by crop type and place bulk orders.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f3d2e">
</head>
<body class="page-with-bottom-nav">
  <div id="offline-banner" class="offline-banner">⚠️ Offline — showing cached listings</div>

  <nav class="navbar">
    <div class="container">
      <div class="navbar-brand">🌾 Mandi<span>Connect</span></div>
      <div class="navbar-links">
        <span id="nav-user-info" style="color:rgba(255,255,255,0.8);font-size:0.88rem;"></span>
        <a href="order-management.html">My Orders</a>
        <button id="btn-logout" class="btn btn-outline btn-sm" style="color:white;border-color:rgba(255,255,255,0.4);">Logout</button>
      </div>
    </div>
  </nav>

  <div class="page-header">
    <h1>🛒 Crop Marketplace</h1>
    <p>Buy directly from farmers — no middlemen, fair prices</p>
  </div>

  <main>
    <div class="container">
      <!-- Filter Bar -->
      <div class="filter-bar mt-2">
        <input type="text" id="search-input" class="form-control" placeholder="🔍 Search crop name...">
        <button class="btn btn-primary" onclick="loadMarketplace()">Search</button>
        <button class="btn btn-outline" onclick="clearSearch()">Clear</button>
      </div>

      <!-- Results count -->
      <div class="flex-between mb-2">
        <p class="text-muted" id="results-count" style="font-size:0.88rem;">Loading...</p>
      </div>

      <!-- Loading -->
      <div id="market-loading"><div class="spinner"></div></div>

      <!-- Crop Listings Grid -->
      <div id="crops-grid"></div>
    </div>
  </main>

  <!-- Order Modal -->
  <div id="order-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:500;align-items:center;justify-content:center;padding:16px;">
    <div class="card" style="max-width:440px;width:100%;max-height:90vh;overflow-y:auto;">
      <div class="flex-between mb-2">
        <h3 id="modal-title" style="font-size:1.1rem;">Place Order</h3>
        <button onclick="closeModal()" style="border:none;background:none;font-size:1.4rem;cursor:pointer;color:var(--text-muted);">✕</button>
      </div>
      <div id="modal-crop-info" class="card mb-2" style="background:var(--bg);border:1px solid var(--border);"></div>
      <form id="order-form" onsubmit="handleOrder(event)">
        <div class="form-group">
          <label class="form-label" for="order-qty">Quantity (kg) *</label>
          <input type="number" id="order-qty" class="form-control" placeholder="e.g. 100" min="1" step="0.5" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="delivery-address">Delivery Address *</label>
          <textarea id="delivery-address" class="form-control" rows="2" placeholder="Shop address for delivery" required></textarea>
        </div>
        <div class="form-group">
          <label class="form-label" for="preferred-date">Preferred Delivery Date</label>
          <input type="date" id="preferred-date" class="form-control">
        </div>
        <div class="card mb-2" style="background:var(--bg);border:1px solid var(--border);">
          <div class="flex-between">
            <span>Total Amount:</span>
            <strong id="order-total" style="color:var(--primary);font-size:1.15rem;">₹0</strong>
          </div>
        </div>
        <button type="submit" id="order-btn" class="btn btn-primary btn-block">📦 Place Order</button>
      </form>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="marketplace.html" class="active"><span class="nav-icon">🛒</span>Market</a>
    <a href="order-management.html"><span class="nav-icon">📦</span>Orders</a>
    <a href="#" id="mobile-logout"><span class="nav-icon">👤</span>Logout</a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/db.js"></script>
  <script>
    registerServiceWorker();
    const profile = requireAuth('retailer');
    if (!profile) throw new Error('Redirect');

    renderNavUser();
    setupConnectivityMonitor();

    document.getElementById('mobile-logout').addEventListener('click', e => { e.preventDefault(); logoutUser(); });

    let currentCrop = null;
    let allCrops = [];

    document.getElementById('search-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') loadMarketplace();
    });

    async function loadMarketplace() {
      document.getElementById('market-loading').style.display = 'block';
      document.getElementById('crops-grid').innerHTML = '';
      try {
        const search = document.getElementById('search-input').value.trim();
        const result = await api.getCrops(search);
        allCrops = result.data || [];
        document.getElementById('results-count').textContent = `${allCrops.length} listing${allCrops.length !== 1 ? 's' : ''} found`;
        renderCrops(allCrops);
      } catch (e) {
        document.getElementById('crops-grid').innerHTML = '<div class="alert alert-warning">Could not load listings (offline).</div>';
        document.getElementById('results-count').textContent = '';
      }
      document.getElementById('market-loading').style.display = 'none';
    }

    function clearSearch() {
      document.getElementById('search-input').value = '';
      loadMarketplace();
    }

    function renderCrops(crops) {
      const el = document.getElementById('crops-grid');
      if (!crops.length) {
        el.innerHTML = `<div class="empty-state"><div class="empty-icon">🌾</div><h3>No listings found</h3><p>Try a different search term.</p></div>`;
        return;
      }
      el.innerHTML = crops.map(c => `
        <div class="card crop-card mb-2">
          <div class="flex-row gap-2" style="display:flex;">
            ${c.image_url ? `
              <div class="crop-img-container" style="width:120px; height:120px; overflow:hidden; border-radius:8px; flex-shrink:0;">
                <img src="${c.image_url}" alt="${c.crop_name}" style="width:100%; height:100%; object-fit:cover;">
              </div>
            ` : `
              <div class="crop-img-placeholder" style="width:120px; height:120px; background:#f0f7f2; display:flex; align-items:center; justify-content:center; border-radius:8px; font-size:2.5rem; flex-shrink:0;">
                🌾
              </div>
            `}
            <div style="flex:1;">
              <div class="flex-between">
                <div>
                  <div class="card-title" style="margin:0;">🌿 ${c.crop_name}</div>
                  <div class="crop-price">₹${c.price_per_kg}/kg</div>
                </div>
                <div style="text-align:right;">
                  <div style="font-size:0.75rem;color:var(--text-muted);">Available</div>
                  <div style="font-weight:700;font-size:1.1rem;">${c.quantity_kg} kg</div>
                </div>
              </div>
              
              <div class="crop-meta" style="margin: 8px 0;">
                <span>📍 ${c.farmer_location || 'Unknown'}</span>
                <span>👨‍🌾 ${c.farmer_name}</span>
              </div>
              
              ${c.description ? `<p style="font-size:0.85rem; line-height:1.3; color:var(--text-muted); margin-bottom:8px;">${c.description.substring(0, 100)}${c.description.length > 100 ? '...' : ''}</p>` : ''}
              
              <div class="crop-actions" style="margin-top:0;">
                <button onclick='openOrderModal(${JSON.stringify(c).replace(/'/g, "&#39;")})' class="btn btn-primary btn-sm">📦 Place Order</button>
              </div>
            </div>
          </div>
        </div>
      `).join('');
    }

    function openOrderModal(crop) {
      currentCrop = crop;
      document.getElementById('modal-title').textContent = `Order: ${crop.crop_name}`;
      document.getElementById('modal-crop-info').innerHTML = `
        <div class="flex-between">
          <span><strong>${crop.crop_name}</strong> · ₹${crop.price_per_kg}/kg</span>
          <span class="text-muted">${crop.quantity_kg} kg available</span>
        </div>
        <div class="text-muted mt-1" style="font-size:0.85rem;">Farmer: ${crop.farmer_name} · 📍 ${crop.farmer_location || 'N/A'}</div>
      `;
      document.getElementById('order-qty').value = '';
      document.getElementById('order-total').textContent = '₹0';
      document.getElementById('order-modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('order-modal').style.display = 'none';
      currentCrop = null;
    }

    document.getElementById('order-qty').addEventListener('input', function() {
      if (currentCrop) {
        const total = (parseFloat(this.value) || 0) * currentCrop.price_per_kg;
        document.getElementById('order-total').textContent = `₹${total.toFixed(2)}`;
      }
    });

    async function handleOrder(e) {
      e.preventDefault();
      const btn = document.getElementById('order-btn');
      btn.disabled = true; btn.textContent = 'Placing order...';
      try {
        const qty = parseFloat(document.getElementById('order-qty').value);
        if (qty > currentCrop.quantity_kg) throw new Error('Quantity exceeds available stock');

        const orderData = {
          crop_id: currentCrop.id,
          farmer_id: currentCrop.farmer_id,
          retailer_id: profile.id,
          retailer_name: profile.full_name,
          retailer_phone: profile.phone,
          crop_name: currentCrop.crop_name,
          quantity_kg: qty,
          price_per_kg: currentCrop.price_per_kg,
          pickup_location: currentCrop.farmer_location,
          delivery_address: document.getElementById('delivery-address').value.trim(),
          estimated_delivery_date: document.getElementById('preferred-date').value || null
        };

        const result = await api.placeOrder(orderData);
        if (!result.success) throw new Error(result.error);
        closeModal();
        showAlert(`✅ Order placed! Total: ₹${result.data.total_price}`, 'success');
        setTimeout(() => window.location.href = `/order-management.html`, 1500);
      } catch (err) {
        showAlert(err.message || 'Failed to place order.', 'error');
        btn.disabled = false; btn.textContent = '📦 Place Order';
      }
    }

    loadMarketplace();
  </script>
</body>
</html>
