<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farmer Dashboard | Mandi-Connect</title>
  <meta name="description" content="Manage your crop listings and orders on Mandi-Connect.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f3d2e">
</head>
<body>

  <nav class="navbar">
    <div class="container">
      <div class="navbar-brand" data-i18n="nav_brand">🌾 Mandi<span>Connect</span></div>
      <div class="navbar-links">
        <select class="i18n-select" style="background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 4px; padding: 4px 8px; font-size: 0.8rem; margin-right: 10px; outline: none; cursor: pointer;">
          <option value="en">English</option>
          <option value="hi">हिन्दी (Hindi)</option>
          <option value="kn">ಕನ್ನಡ (Kannada)</option>
        </select>
        <span id="nav-user-info" style="color:rgba(255,255,255,0.8);font-size:0.88rem;"></span>
        <a href="order-management.html" class="active" data-i18n="view_orders_btn">Orders</a>
        <button id="btn-logout" class="btn btn-outline btn-sm" style="color:white;border-color:rgba(255,255,255,0.4);">Logout</button>
      </div>
    </div>
  </nav>

  <div class="page-header">
    <h1 data-i18n="dashboard_title">🌾 Farmer Dashboard</h1>
    <p data-i18n="dashboard_subtitle">Manage your crops and view incoming orders</p>
  </div>

  <main>
    <div class="container">
      <!-- Stats -->
      <div class="stats-bar mt-2">
        <div class="stat-item">
          <div class="stat-value" id="stat-listings">—</div>
          <div class="stat-label" data-i18n="active_listings">Active Listings</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="stat-orders">—</div>
          <div class="stat-label" data-i18n="pending_orders">Pending Orders</div>
        </div>
      </div>



      <!-- Quick Actions -->
      <div class="section">
        <div class="section-title" data-i18n="quick_actions">Quick Actions</div>
        <div style="display:flex;gap:12px;flex-wrap:wrap;">
          <a href="add-crop.html" class="btn btn-primary btn-lg" data-i18n="add_crop_btn">+ Add Crop Listing</a>
          <a href="ai-predictor.html" class="btn btn-accent btn-lg" data-i18n="ai_predictor_btn">🤖 AI Price Predictor</a>
          <a href="order-management.html" class="btn btn-outline" data-i18n="view_orders_btn">📦 View Orders</a>
        </div>
      </div>

      <!-- My Crops -->
      <div class="section">
        <div class="flex-between mb-2">
          <div class="section-title" data-i18n="my_listings" style="border:none;margin:0;padding:0;">My Active Listings</div>
          <a href="add-crop.html" class="btn btn-sm btn-outline" data-i18n="add_new">+ Add New</a>
        </div>
        <div id="crops-list"></div>
      </div>
    </div>
  </main>

  <!-- Edit Crop Modal -->
  <div id="edit-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:1000;align-items:center;justify-content:center;padding:16px;">
    <div class="card" style="max-width:480px;width:100%;max-height:90vh;overflow-y:auto;">
      <div class="flex-between mb-2">
        <h3>✏️ Edit Listing</h3>
        <button onclick="closeEditModal()" style="border:none;background:none;font-size:1.4rem;cursor:pointer;">✕</button>
      </div>
      <form id="edit-crop-form" onsubmit="handleEditSubmit(event)">
        <input type="hidden" id="edit-crop-id">
        <div class="form-group">
          <label class="form-label" data-i18n="crop_name">Crop Name</label>
          <input type="text" id="edit-crop-name" class="form-control" required>
        </div>
        <div class="grid-2">
          <div class="form-group">
            <label class="form-label">Quantity (kg)</label>
            <input type="number" id="edit-quantity" class="form-control" required>
          </div>
          <div class="form-group">
            <label class="form-label">Price / kg (₹)</label>
            <input type="number" id="edit-price" class="form-control" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Update Photo (Optional)</label>
          <input type="file" id="edit-image" class="form-control" accept="image/*" onchange="previewEditImage(event)">
          <div class="mt-1">
            <img id="edit-image-preview" src="" style="max-width:100%; height:120px; border-radius:8px; display:none; object-fit:cover;">
          </div>
        </div>
        <button type="submit" id="edit-save-btn" class="btn btn-primary btn-block" data-i18n="save_changes">💾 Save Changes</button>
      </form>
    </div>
  </div>

  <!-- Mobile bottom nav -->
  <nav class="bottom-nav">
    <a href="farmer-dashboard.html" class="active"><span class="nav-icon">🏠</span>Home</a>
    <a href="add-crop.html"><span class="nav-icon">➕</span>Add Crop</a>
    <a href="order-management.html"><span class="nav-icon">📦</span>Orders</a>
    <a href="login.html" id="mobile-logout"><span class="nav-icon">👤</span>Logout</a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/api.js"></script>

  <script src="js/i18n.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/raitha-mithra.js"></script>
  <script>
    const profile = requireAuth('farmer');
    if (!profile) throw new Error('Redirect');

    renderNavUser();

    document.getElementById('mobile-logout')?.addEventListener('click', (e) => {
      e.preventDefault();
      logoutUser();
    });
    async function loadDashboard() {
      const cropsList = document.getElementById('crops-list');
      cropsList.innerHTML = '<div class="spinner"></div>';
      
      try {
        const [cropsRes, ordersRes] = await Promise.all([
          api.getCropsByFarmer(profile.id),
          api.getOrdersByFarmer(profile.id)
        ]);

        const remoteCrops = cropsRes.data || [];
        currentCrops = remoteCrops;
        const orders = ordersRes.data || [];
        const pendingOrders = orders.filter(o => o.status === 'pending').length;

        document.getElementById('stat-listings').textContent = currentCrops.filter(c => c.is_available).length;
        document.getElementById('stat-orders').textContent = pendingOrders;

        renderCrops(currentCrops);
      } catch (e) {
        cropsList.innerHTML = '<div class="alert alert-danger">Error loading listings. Please check your connection.</div>';
      }
    }

    function renderCrops(crops) {
      const el = document.getElementById('crops-list');
      const getT = (key) => (window.i18n && window.i18n.get(key)) || key;
      const getDataT = (val) => (window.i18n && window.i18n.getDataT(val)) || val;

      if (!crops.length) {
        el.innerHTML = `<div class="empty-state"><div class="empty-icon">🌱</div><h3>No crops listed yet</h3><p>Add your first crop listing to start selling.</p><a href="add-crop.html" class="btn btn-primary mt-2">+ Add Crop</a></div>`;
        return;
      }
      el.innerHTML = crops.map(c => `
        <div class="card crop-card" style="padding:15px; margin-bottom:15px;">
          <div style="display:flex; gap:15px; align-items:start;">
            ${c.image_url ? `
              <img src="${c.image_url}" style="width:120px; height:120px; border-radius:12px; object-fit:cover; border:1px solid var(--border);" alt="${c.crop_name}">
            ` : `
              <div style="width:120px; height:120px; border-radius:12px; background:var(--bg); border:1px dashed var(--border); display:flex; align-items:center; justify-content:center; font-size:2.5rem;">🌱</div>
            `}
            <div style="flex:1;">
                 <div class="flex-between">
                   <div>
                     <h3 style="margin:0; color:var(--text-dark);">${getDataT(c.crop_name)}</h3>
                     <p class="crop-price" style="margin:5px 0;">₹${c.price_per_kg}/kg</p>
                   </div>
                    <span class="badge ${c.is_pending ? 'badge-pending' : (c.is_available ? 'badge-accepted' : 'badge-rejected')}">
                      ${c.is_pending ? 'Pending Sync' : (c.is_available ? getT('available') : getT('out_of_stock'))}
                    </span>
                </div>
                
                <div style="margin:10px 0; display:flex; gap:10px; font-size:0.88rem; color:var(--text-muted);">
                   <span><strong>📦 ${c.quantity_kg}</strong> kg available</span>
                   <span>📍 ${getDataT(c.farmer_location) || 'Local'}</span>
                </div>

                 <div style="display:flex; gap:10px; margin-top:15px;">
                   <button onclick="openEditModal('${c.id}')" class="btn btn-sm btn-accent" style="flex:1;" ${c.is_pending ? 'disabled title="Syncing..." ' : ''} data-i18n="edit_listing">${getT('edit_listing')}</button>
                   <button onclick="deleteCropListing('${c.id}')" class="btn btn-sm btn-outline" style="flex:1; color:var(--danger); border-color:var(--danger);" data-i18n="delete">${getT('delete')}</button>
                 </div>
            </div>
          </div>
        </div>
      `).join('');
    }

    // --- NEW: Edit & Delete Handlers ---
    let currentCrops = []; // Store loaded crops for quick lookup
    
    async function deleteCropListing(id) {
      if (!confirm("Are you sure you want to delete this listing?")) return;
      try {
        const res = await api.deleteCrop(id);
        if (res.success) {
          showAlert("✅ Listing deleted!", "success");
          loadDashboard();
        }
      } catch (e) {
        showAlert("Failed to delete crop.");
      }
    }

    function openEditModal(id) {
      const crop = currentCrops.find(c => c.id === id);
      if (!crop) return;
      
      document.getElementById('edit-crop-id').value = crop.id;
      document.getElementById('edit-crop-name').value = crop.crop_name;
      document.getElementById('edit-quantity').value = crop.quantity_kg;
      document.getElementById('edit-price').value = crop.price_per_kg;
      
      const preview = document.getElementById('edit-image-preview');
      if (crop.image_url) {
        preview.src = crop.image_url;
        preview.style.display = 'block';
      } else {
        preview.style.display = 'none';
      }
      
      document.getElementById('edit-modal').style.display = 'flex';
    }

    function closeEditModal() {
      document.getElementById('edit-modal').style.display = 'none';
    }

    function previewEditImage(event) {
      const input = event.target;
      const preview = document.getElementById('edit-image-preview');
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => { 
          preview.src = e.target.result;
          preview.style.display = 'block';
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    async function handleEditSubmit(e) {
      e.preventDefault();
      const id = document.getElementById('edit-crop-id').value;
      const btn = document.getElementById('edit-save-btn');
      btn.disabled = true; btn.textContent = 'Saving...';
      
      const imageFile = document.getElementById('edit-image').files[0];
      let imageUrl = document.getElementById('edit-image-preview').src;
      
      if (imageFile) {
        imageUrl = await new Promise((resolve) => {
          const reader = new FileReader();
          reader.readAsDataURL(imageFile);
          reader.onload = () => resolve(reader.result);
        });
      }

      const updates = {
        crop_name: document.getElementById('edit-crop-name').value,
        quantity_kg: parseFloat(document.getElementById('edit-quantity').value),
        price_per_kg: parseFloat(document.getElementById('edit-price').value),
        image_url: imageUrl,
        is_available: parseFloat(document.getElementById('edit-quantity').value) > 0
      };

      try {
        const res = await api.updateCrop(id, updates);
        if (res.success) {
          showAlert("✅ Listing updated!", "success");
          closeEditModal();
          loadDashboard();
        }
      } catch (e) {
        showAlert("Failed to update listing.");
      } finally {
        btn.disabled = false; btn.textContent = '💾 Save Changes';
      }
    }
    
    // End of Handlers

    // Re-render when language changes without refresh
    window.addEventListener('languageChanged', () => {
      if (currentCrops.length) renderCrops(currentCrops);
    });

    loadDashboard();
  </script>
</body>
</html>
